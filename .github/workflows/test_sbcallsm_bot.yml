name: Test SB Calls Sisense Widget

on:
  workflow_dispatch:

jobs:
  test_widget:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Login to Sisense and send widget screenshot
        env:
          SISENSE_USER: ${{ secrets.SISENSE_USER }}
          SISENSE_PASS: ${{ secrets.SISENSE_PASS }}
          SBCALLSM_BOT_TOKEN: ${{ secrets.SBCALLSM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python sisense_widget_to_telegram.py
